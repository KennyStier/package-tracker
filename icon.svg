<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="top" x1="50" y1="60" x2="78" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAB878"/>
      <stop offset="1" stop-color="#D99C54"/>
    </linearGradient>
    <linearGradient id="front" x1="0" y1="54" x2="0" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8974F"/>
      <stop offset="1" stop-color="#BC7A33"/>
    </linearGradient>
    <linearGradient id="side" x1="84" y1="50" x2="112" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B7742F"/>
      <stop offset="1" stop-color="#985C24"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.36" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#F5FBFF" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#DCEAF1" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#B6C9D4" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="b"/>
      <feOffset in="b" dy="2.5" result="o"/>
      <feComponentTransfer in="o" result="s"><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#drop)" transform="translate(64 64) scale(1.13) translate(-68.25 -84.25)">
    <!-- Box faces -->
    <g stroke="#6E4218" stroke-width="2" stroke-linejoin="round">
      <polygon points="16,54 84,66 84,116 16,104" fill="url(#front)"/>
      <polygon points="84,66 112,50 112,100 84,116" fill="url(#side)"/>
      <polygon points="16,54 84,66 112,50 44,38" fill="url(#top)"/>
    </g>

    <!-- Top flap seam -->
    <line x1="50" y1="60" x2="78" y2="44" stroke="#7A4A1E" stroke-width="1.6" opacity="0.85"/>

    <!-- Tape strip sealing the top, with a tab folded over the front edge -->
    <g fill="#EDD8A8" fill-opacity="0.95" stroke="#C9A468" stroke-width="1">
      <polygon points="35,57.3 65,62.6 65,71.6 35,66.3"/>
      <polygon points="16,54 84,66 96.6,58.8 28.6,46.8"/>
    </g>

    <!-- Magnifying glass in front (black handle) -->
    <line x1="89" y1="99" x2="114" y2="124" stroke="#141518" stroke-width="13" stroke-linecap="round"/>
    <line x1="89" y1="99" x2="114" y2="124" stroke="#45494F" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="90" y1="100" x2="110" y2="120" stroke="#71767C" stroke-width="1.6" stroke-linecap="round" opacity="0.75"/>
    <circle cx="70" cy="80" r="27" fill="#15161A"/>
    <circle cx="70" cy="80" r="23" fill="#3A3E44"/>
    <circle cx="70" cy="80" r="21" fill="#A6ACB2"/>
    <circle cx="70" cy="80" r="19" fill="url(#glass)" stroke="#14151A" stroke-width="1.3"/>
    <path d="M58 70 a18 18 0 0 1 15 -7" fill="none" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="3.4" stroke-linecap="round"/>
  </g>
</svg>
