<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Package Tracker</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --border: #262b36;
        --text: #e7eaf0;
        --muted: #8b93a3;
        --accent: #4c8dff;
        --accent-fg: #ffffff;
        --ok: #38d39f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 320px;
        font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap { padding: 14px; }
      h1 {
        margin: 0 0 2px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      p.sub { margin: 0 0 12px; color: var(--muted); font-size: 11px; }
      form { display: flex; gap: 8px; }
      input {
        flex: 1;
        min-width: 0;
        padding: 9px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        font-size: 13px;
        outline: none;
      }
      input:focus { border-color: var(--accent); }
      button {
        padding: 9px 14px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: var(--accent-fg);
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.4; cursor: default; }
      .status {
        margin-top: 10px;
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }
      .status.match { color: var(--ok); }
      .status .name { font-weight: 600; }
      .carriers {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 11px;
      }
      .carriers span {
        display: inline-block;
        margin: 3px 4px 0 0;
        padding: 2px 7px;
        border: 1px solid var(--border);
        border-radius: 999px;
      }
      .settingslink {
        margin-top: 12px;
        padding: 0;
        background: none;
        color: var(--accent);
        font-weight: 500;
        font-size: 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Package Tracker</h1>
      <p class="sub">Paste a tracking number to open its carrier page — or just use the search bar.</p>
      <form id="form">
        <input
          id="input"
          type="text"
          placeholder="e.g. 1Z999AA10123456784"
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
        <button id="go" type="submit" disabled>Track</button>
      </form>
      <div class="status" id="status"></div>
      <button class="settingslink" id="settings" type="button">Manage carriers…</button>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
